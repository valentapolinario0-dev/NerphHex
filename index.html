<textarea id="script"></textarea>
<br>
<button onclick="create()">Criar RAW</button>

<p id="link"></p>

<script>

const token = "SEU_GITHUB_TOKEN"

function randomCode(){
return Math.random().toString(36).substring(2,10)
}

async function create(){

let script = document.getElementById("script").value
let code = randomCode()

let response = await fetch(
"https://api.github.com/repos/valentapolinario0-dev/NerphHex/contents/"+code+".lua",
{
method:"PUT",
headers:{
"Authorization":"Bearer "+token,
"Content-Type":"application/json"
},
body:JSON.stringify({
message:"new script",
content:btoa(script)
})
})

let raw = "https://raw.githubusercontent.com/valentapolinario0-dev/NerphHex/main/"+code+".lua"

document.getElementById("link").innerHTML =

`
RAW:<br>
${raw}
<br><br>

ROBLOX:<br>

loadstring(game:HttpGet("${raw}"))()
`

}

</script>
