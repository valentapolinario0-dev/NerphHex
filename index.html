<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NerphHex Script Hub</title>

<style>

body{
background:#0a0a0a;
color:#00ff9c;
font-family:monospace;
text-align:center;
padding:40px;
}

textarea{
width:80%;
height:250px;
background:#111;
color:#00ff9c;
border:1px solid #00ff9c;
padding:10px;
}

button{
margin-top:10px;
padding:12px;
background:#00ff9c;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<h1>NerphHex Script Creator</h1>

<textarea id="script" placeholder="Cole seu script Lua aqui..."></textarea>

<br>

<button onclick="generate()">Gerar Script</button>

<p id="link"></p>

<script>

function randomCode(length=8){
const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
let code="";
for(let i=0;i<length;i++){
code+=chars[Math.floor(Math.random()*chars.length)];
}
return code;
}

function generate(){

let code=randomCode()

let rawLink="https://raw.githubusercontent.com/valentapolinario0-dev/NerphHex/main/"+code+".lua"

document.getElementById("link").innerHTML=

`
RAW LINK:<br>
${rawLink}
<br><br>

USE NO ROBLOX:<br>

loadstring(game:HttpGet("${rawLink}"))()
`

}

</script>

</body>
</html>
