<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NerphHex</title>

<style>

body{
background:#000;
color:#00ff9c;
font-family:monospace;
text-align:center;
padding:40px;
}

textarea{
width:80%;
height:200px;
background:#111;
color:#00ff9c;
border:1px solid #00ff9c;
padding:10px;
}

button{
margin-top:10px;
padding:10px;
background:#00ff9c;
border:none;
cursor:pointer;
}

</style>
</head>

<body id="body">

<div id="editor">

<h1>NerphHex RAW Creator</h1>

<textarea id="text" placeholder="Digite seu script..."></textarea>

<br>

<button onclick="createRaw()">Criar Link RAW</button>

<p id="link"></p>

</div>

<script>

function randomCode(length=8){
const chars="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
let result="";
for(let i=0;i<length;i++){
result+=chars[Math.floor(Math.random()*chars.length)];
}
return result;
}

function createRaw(){

let content=document.getElementById("text").value;

let code=randomCode();

localStorage.setItem("raw_"+code,content);

let url=window.location.origin+window.location.pathname+"#"+code;

document.getElementById("link").innerHTML=
"<a href='"+url+"'>"+url+"</a>";

}

function loadRaw(){

let code=location.hash.replace("#","");

if(!code)return;

let content=localStorage.getItem("raw_"+code);

if(!content)return;

document.body.innerHTML="<pre>"+content+"</pre>";

}

loadRaw();

</script>

</body>
</html>
